<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
<title>Telepad</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#0f172a; color:#f8fafc; font-family:'Inter', system-ui, sans-serif; overflow:hidden; touch-action:manipulation; user-select:none; height:100vh; height:100dvh; }
  
  .tabs { display:flex; height:56px; background:#1e293b; border-bottom:1px solid #334155; padding: 0 8px; }
  .tab { flex:1; display:flex; align-items:center; justify-content:center; cursor:pointer; color:#94a3b8; font-weight:500; font-size:14px; transition:color 0.15s; border-bottom: 2px solid transparent; }
  .tab.a { color:#38bdf8; border-bottom-color:#38bdf8; }
  
  .p { display:none; height:calc(100vh - 56px); height:calc(100dvh - 56px); }
  .p.a { display:flex; flex-direction:column; }
  
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:20px; overflow-y:auto; }
  .btn { background:#1e293b; border:1px solid #334155; color:#f8fafc; padding:20px 12px; text-align:center; border-radius:16px; font-weight:500; font-size:14px; display:flex; flex-direction:column; align-items:center; gap:8px; transition:transform 0.1s, background 0.15s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
  .btn:active { background:#334155; transform:scale(0.96); }
  .btn svg { stroke:#94a3b8; }
  .btn.accent-red svg { stroke:#f87171; }
  .btn.accent-blue svg { stroke:#38bdf8; }
  
  /* Trackpad Specifics */
  #pad-container { flex:1; padding:20px; display:flex; flex-direction:column; }
  #pad { flex:1; background:#0b1120; border:1px solid #1e293b; border-radius:24px; box-shadow:inset 0 4px 12px rgba(0,0,0,0.4); touch-action:none; position:relative; }
  .pad-hint { text-align:center; color:#64748b; font-size:12px; margin-top:16px; pointer-events:none; }
  
  /* Utilities */
  #status-wrapper { position:fixed; top:64px; right:16px; display:flex; align-items:center; gap:6px; background:#1e293b; padding:6px 12px; border-radius:20px; border:1px solid #334155; z-index:99; font-size:12px; color:#94a3b8; box-shadow:0 4px 6px rgba(0,0,0,0.1); }
  #status { width:8px; height:8px; border-radius:50%; background:#f87171; transition:background 0.3s; }
  #status.ok { background:#10b981; }
  
  #fs { position:fixed; top:64px; left:16px; padding:8px 12px; background:#1e293b; border:1px solid #334155; border-radius:20px; z-index:99; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 6px rgba(0,0,0,0.1); }
  
  /* Keyboard Panel */
  #kb { padding:20px; overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:16px; }
  .mods { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .mod { background:#1e293b; border:1px solid #334155; padding:16px 8px; text-align:center; border-radius:12px; font-size:13px; font-weight:600; color:#94a3b8; transition:all 0.15s; }
  .mod.on { background:#38bdf8; color:#0f172a; border-color:#38bdf8; }
  
  input { width:100%; padding:16px; background:#1e293b; border:1px solid #334155; color:#f8fafc; font-size:16px; font-family:'Inter', sans-serif; border-radius:12px; transition:border-color 0.2s; }
  input:focus { outline:none; border-color:#38bdf8; }
  .info { color:#64748b; font-size:12px; text-align:center; padding-top:16px; line-height:1.5; margin-top:auto; }

  /* Minimal horizontal layout for smaller row buttons */
  .grid-horizontal .btn { flex-direction:row; justify-content:center; padding:16px; }
</style>
</head><body>

<div id="status-wrapper"><div id="status"></div><span id="st-text">Connecting</span></div>
<div id="fs" onclick="document.documentElement.requestFullscreen?.()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg></div>

<div class="tabs">
  <div class="tab" onclick="sw(0)">Controls</div>
  <div class="tab a" onclick="sw(1)">Trackpad</div>
  <div class="tab" onclick="sw(2)">Keyboard</div>
</div>

<!-- Controls Panel -->
<div class="p"><div class="grid">
  <div class="btn accent-red" onclick="c('lock')">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0110 0v4"></path></svg>
    Lock PC
  </div>
  <div class="btn" onclick="c('mute')">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
    Mute
  </div>
  <div class="btn" onclick="c('voldn')">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="15" y1="9" x2="15" y2="15"></line></svg>
    Vol Down
  </div>
  <div class="btn" onclick="c('volup')">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"></path></svg>
    Vol Up
  </div>
  <div class="btn accent-blue" onclick="c('prev')">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>
    Prev
  </div>
  <div class="btn accent-blue" onclick="c('play')">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
    Play/Pause
  </div>
  <div class="btn accent-blue" onclick="c('next')">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
    Next
  </div>
  <div class="btn" onclick="sk(32)" style="flex-direction:row; justify-content:center;">
    Space
  </div>
</div></div>

<!-- Trackpad Panel -->
<div class="p a"><div id="pad-container">
  <div id="pad"></div>
  <div class="pad-hint">Tap: click | 2-finger tap: right-click<br>Drag: move | 2-finger drag: scroll</div>
</div></div>

<!-- Keyboard Panel -->
<div class="p"><div id="kb">
  
  <div class="mods">
    <div class="mod" id="ctrl">CTRL</div>
    <div class="mod" id="alt">ALT</div>
    <div class="mod" id="shift">SHIFT</div>
    <div class="mod" id="win">WIN</div>
  </div>
  
  <div class="mods grid-horizontal" style="gap:12px;">
    <div class="btn" onclick="sk(9)">TAB</div>
    <div class="btn" onclick="sk(27)">ESC</div>
    <div class="btn" onclick="sk(13)">ENT</div>
    <div class="btn" onclick="sk(8)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg></div>
  </div>
  
  <div class="mods grid-horizontal" style="gap:12px;">
    <div class="btn" onclick="sk(37)">←</div>
    <div class="btn" onclick="sk(38)">↑</div>
    <div class="btn" onclick="sk(40)">↓</div>
    <div class="btn" onclick="sk(39)">→</div>
  </div>
  
  <input id="inp" type="text" placeholder="Tap here to type naturally..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  
  <div class="info">Input is sent instantly. Toggle modifiers above before pressing keys or typing letters.</div>
</div></div>

<script>
const st=document.getElementById('status');
const stTxt=document.getElementById('st-text');
let ws,rt=0;
function connect(){
  ws=new WebSocket('ws://'+location.host);
  ws.onopen=()=>{st.classList.add('ok'); stTxt.innerText='Connected'; rt=0;};
  ws.onclose=()=>{st.classList.remove('ok'); stTxt.innerText='Offline'; setTimeout(connect,Math.min(1000*2**rt++,30000));};
  ws.onerror=()=>ws.close();
}
connect();
function s(m){if(ws?.readyState===1)ws.send(m)}
function c(x){s('cmd|'+x)}
function sw(i){
  document.querySelectorAll('.tab').forEach((t,x)=>t.classList.toggle('a',x===i));
  document.querySelectorAll('.p').forEach((p,x)=>p.classList.toggle('a',x===i))
}

// Trackpad logic (NO bloat, zero-dependency Javascript)
const pad=document.getElementById('pad');
let lx=0,ly=0,ax=0,ay=0,as=0,mf=0,ts=0,tm=0,ct=null,dr=0;
setInterval(()=>{
  if(ax||ay){s(`mv|${ax.toFixed(1)}|${ay.toFixed(1)}`);ax=ay=0}
  if(as){s(`sc|${as.toFixed(1)}`);as=0}
},16);

pad.ontouchstart=e=>{
  e.preventDefault(); const f=e.touches.length; mf=Math.max(mf,f);
  lx=e.touches[0].clientX; ly=e.touches[0].clientY;
  if(f===1&&mf===1){
    if(ct){clearTimeout(ct);ct=null;dr=1;s('md|1')}
    ts=Date.now();tm=0;
  } else {tm=0}
};
pad.ontouchmove=e=>{
  e.preventDefault();
  const cx=e.touches[0].clientX,cy=e.touches[0].clientY,dx=cx-lx,dy=cy-ly;
  tm+=Math.abs(dx)+Math.abs(dy);
  if(mf===1){ax+=dx;ay+=dy}else if(mf>=2&&tm>3){as+=dy}
  lx=cx;ly=cy;
};
pad.ontouchend=e=>{
  e.preventDefault(); const d=Date.now()-ts;
  if(dr){s('mu|1');dr=0;mf=0;return}
  if(!e.touches.length){
    if(mf===1&&tm<12&&d<250){ct=setTimeout(()=>{s('cl');ct=null},150)}
    else if(mf>=2&&tm<15&&d<350){s('rc')}
    mf=0;
  }
};

// Keyboard logic
let ctrl=0,alt=0,shift=0,win=0;
function clrMods(){ctrl=alt=shift=win=0;document.querySelectorAll('.mod').forEach(x=>x.classList.remove('on'))}
function sk(vk){s(`key|${vk}|${ctrl}|${shift}|${alt}|${win}`);clrMods()}

document.getElementById('ctrl').onclick=()=>{ctrl=1-ctrl;document.getElementById('ctrl').classList.toggle('on')};
document.getElementById('alt').onclick=()=>{alt=1-alt;document.getElementById('alt').classList.toggle('on')};
document.getElementById('shift').onclick=()=>{shift=1-shift;document.getElementById('shift').classList.toggle('on')};
document.getElementById('win').onclick=()=>{win=1-win;document.getElementById('win').classList.toggle('on')};

const inp=document.getElementById('inp');
inp.onkeydown=e=>{
  const k=e.keyCode||e.which;
  if(ctrl||alt||win||(shift&&e.key.length>1)){sk(k);e.preventDefault();return}
  if(e.key.length===1){s('type|'+e.key);e.preventDefault()}
  else{sk(k);e.preventDefault()}
};
inp.oninput=e=>{
  if(e.data&&!ctrl&&!alt&&!win){s('type|'+e.data)}
  inp.value='';
};
</script></body></html>
