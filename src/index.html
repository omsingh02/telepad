<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
<title>Telepad</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#0f172a; color:#f8fafc; font-family:'Inter', system-ui, sans-serif; overflow:hidden; touch-action:manipulation; user-select:none; height:100vh; height:100dvh; display:flex; flex-direction:column; }
  
  /* Top status bar */
  .topbar { display:flex; align-items:center; justify-content:space-between; height:48px; min-height:48px; background:#1e293b; padding:0 16px; border-bottom:1px solid #334155; z-index:100; }
  .topbar-left { display:flex; align-items:center; gap:10px; }
  .topbar-right { display:flex; align-items:center; gap:10px; }
  #fs-btn { display:flex; align-items:center; justify-content:center; width:34px; height:34px; border-radius:10px; background:#0f172a; border:1px solid #334155; flex-shrink:0; }
  /* Connection status */
  .conn-pill { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:#94a3b8; }
  #status { width:8px; height:8px; border-radius:50%; background:#f87171; box-shadow:0 0 6px #ef4444; flex-shrink:0; }
  #status.ok { background:#10b981; box-shadow:0 0 6px #10b981; }
  /* Battery pill */
  .bat-pill { display:flex; align-items:center; gap:5px; font-size:12px; font-weight:600; color:#94a3b8; }
  .bat-icon { width:18px; height:10px; border:1.5px solid #64748b; border-radius:3px; position:relative; flex-shrink:0; }
  .bat-icon::after { content:''; position:absolute; right:-4px; top:50%; transform:translateY(-50%); width:3px; height:5px; background:#64748b; border-radius:0 2px 2px 0; }
  .bat-fill { position:absolute; left:1px; top:1px; bottom:1px; background:#10b981; border-radius:1px; width:0%; transition:width 0.5s; }
  .bat-fill.low { background:#f87171; }
  .charging { color:#fbbf24; font-size:11px; }
  /* Tabs */
  .tabs { display:flex; height:52px; min-height:52px; background:#1e293b; padding:0 8px; z-index:100; }
  .tab { flex:1; display:flex; align-items:center; justify-content:center; cursor:pointer; color:#64748b; font-weight:600; font-size:13px; transition:color 0.15s, border-color 0.15s; border-bottom:3px solid transparent; }
  .tab.a { color:#38bdf8; border-bottom-color:#38bdf8; }
  
  .p { display:none; flex:1; overflow:hidden; }
  .p.a { display:flex; flex-direction:column; }
  
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:20px; overflow-y:auto; }
  .btn { background:#1e293b; border:1px solid #334155; color:#f8fafc; padding:20px 12px; text-align:center; border-radius:18px; font-weight:600; font-size:14px; display:flex; flex-direction:column; align-items:center; gap:10px; transition:transform 0.1s, background 0.15s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); }
  .btn:active { background:#334155; transform:scale(0.96); }
  .btn svg { stroke:#94a3b8; }
  .btn.accent-red svg { stroke:#f87171; }
  .btn.accent-blue svg { stroke:#38bdf8; }

  .media-wrapper { padding: 0 20px 20px 20px; display:flex; flex-direction:column; gap:12px; overflow-y:auto; flex:1; }
  .media-card { background:rgba(30, 41, 59, 0.7); backdrop-filter: blur(8px); border: 1px solid rgba(51, 65, 85, 0.5); padding:16px; border-radius:18px; display:flex; flex-direction:column; gap:12px; }
  .mc-header { display:flex; justify-content:space-between; align-items:center; }
  .mc-title { font-weight:600; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mc-artist { font-size:12px; color:#94a3b8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mc-status { font-size:11px; padding:3px 10px; border-radius:12px; background:#334155; font-weight:700; text-transform:uppercase; }
  .mc-status.playing { background:#10b981; color:#064e3b; }
  .mc-controls { display:flex; justify-content:center; gap:20px; }
  .mc-btn { background:rgba(15, 23, 42, 0.8); border:none; color:#f8fafc; width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:transform 0.1s; }
  .mc-btn:active { transform:scale(0.9); background:#334155; }
  
  #pad-container { flex:1; padding:20px; display:flex; flex-direction:column; }
  #pad { flex:1; background:#0b1120; border:2px solid #1e293b; border-radius:32px; box-shadow:inset 0 4px 16px rgba(0,0,0,0.6); touch-action:none; }
  .pad-hint { text-align:center; color:#64748b; font-size:12px; margin-top:16px; line-height:1.4; opacity:0.8; }
  
  /* Legacy overrides removed — layout is now in topbar */
  
  #kb { padding:20px; overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:20px; }
  .mods { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .mod { background:#1e293b; border:1px solid #334155; padding:18px 8px; text-align:center; border-radius:14px; font-size:13px; font-weight:700; color:#64748b; transition:all 0.2s; }
  .mod.on { background:#38bdf8; color:#0f172a; border-color:#38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
  .mod-clear { grid-column: span 4; background:transparent; border:1px dashed #334155; padding:10px; font-size:11px; text-transform:uppercase; letter-spacing:1px; color:#64748b; border-radius:10px; text-align:center; }
  input { width:100%; padding:18px; background:#1e293b; border:2px solid #334155; color:#f8fafc; font-size:16px; border-radius:14px; font-family:'Inter', sans-serif; transition:border-color 0.2s; }
  input:focus { outline:none; border-color:#38bdf8; }
  .info { color:#64748b; font-size:11px; text-align:center; line-height:1.6; margin-top:10px; }
  .section-title { font-size:13px; font-weight:700; color:#475569; margin: 24px 20px 8px 20px; text-transform:uppercase; letter-spacing:1.5px; }

  /* bat-icon / bat-fill / charging styles moved to topbar section above */
</style>
</head><body>

<!-- Top status bar -->
<div class="topbar">
  <div class="topbar-left">
    <div id="fs-btn" onclick="document.documentElement.requestFullscreen?.()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
    </div>
    <div class="bat-pill">
      <div class="bat-icon"><div id="bat-fill" class="bat-fill"></div></div>
      <span id="bat-charging" class="charging" style="display:none;">⚡</span>
      <span id="bat-val">--%</span>
    </div>
  </div>
  <div class="topbar-right">
    <span id="vol-val" style="font-size:12px;font-weight:600;color:#94a3b8;"></span>
    <div class="conn-pill">
      <div id="status"></div>
      <span id="st-text">Connecting</span>
    </div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab" onclick="sw(0)">CONTROLS</div>
  <div class="tab a" onclick="sw(1)">TRACKPAD</div>
  <div class="tab" onclick="sw(2)">KEYBOARD</div>
</div>

<!-- Panels Content... -->
<div class="p"><div style="display:flex; flex-direction:column; height:100%; padding-bottom:30px;">
  <div class="grid">
    <div class="btn accent-red" onclick="c('lock')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0110 0v4"></path></svg>
      Lock PC
    </div>
    <div class="btn" onclick="c('mute')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
      Mute
    </div>
    <div class="btn" onclick="c('voldn')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="15" y1="9" x2="15" y2="15"></line></svg>
      Vol Down
    </div>
    <div class="btn" onclick="c('volup')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"></path></svg>
      Vol Up
    </div>
    <div class="btn accent-blue" onclick="sk(91)" style="flex-direction:row; justify-content:center; gap:12px;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
      Super
    </div>
    <div class="btn" onclick="sk(32)" style="flex-direction:row; justify-content:center;">Space</div>
  </div>
  <div class="section-title" id="media-title" style="display:none;">Active Streams</div>
  <div class="media-wrapper" id="media-list"></div>
</div></div>

<div class="p a"><div id="pad-container">
  <div id="pad"></div>
  <div class="pad-hint">1-finger: Move & Tap to Click<br>2-fingers: Right Click & Scroll</div>
</div></div>

<div class="p"><div id="kb">
  <div class="mods">
    <div class="mod" id="ctrl" onclick="tm('ctrl')">CTRL</div>
    <div class="mod" id="alt" onclick="tm('alt')">ALT</div>
    <div class="mod" id="shift" onclick="tm('shift')">SHIFT</div>
    <div class="mod" id="win" onclick="tm('win')">SUPER</div>
    <div class="mod-clear" onclick="clr()">Reset Stickiness</div>
  </div>
  <div class="mods">
    <div class="btn" onclick="sk(9)">TAB</div><div class="btn" onclick="sk(27)">ESC</div><div class="btn" onclick="sk(13)">ENT</div><div class="btn" onclick="sk(8)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg></div>
  </div>
  <div class="mods">
    <div class="btn" onclick="sk(37)">←</div><div class="btn" onclick="sk(38)">↑</div><div class="btn" onclick="sk(40)">↓</div><div class="btn" onclick="sk(39)">→</div>
  </div>
  <input id="inp" type="text" placeholder="Start typing here..." autocomplete="off">
  <div class="info">Modifiers are sticky but auto-clear after 5s of inactivity.</div>
</div></div>

<script>
const st=document.getElementById('status'), stTxt=document.getElementById('st-text'), inp=document.getElementById('inp');
let ws,rt=0,ctrl=0,shift=0,alt=0,win=0,timer=null;

function connect(){
  ws=new WebSocket('ws://'+location.host+location.search);
  ws.onopen=()=>{st.classList.add('ok'); stTxt.innerText='Online'; document.title='● Telepad'; rt=0; clr(); fetchMedia();};
  ws.onclose=()=>{st.classList.remove('ok'); stTxt.innerText='Offline'; document.title='○ Telepad'; setTimeout(connect,Math.min(1000*2**rt++,30000));};
}
connect();

function rst(){
  if(timer) clearTimeout(timer);
  if(ctrl||shift||alt||win) timer=setTimeout(clr, 5000);
}

function s(m){if(ws?.readyState===1){ws.send(`${m}|${ctrl}|${shift}|${alt}|${win}`); rst();}}
function c(x){s('cmd|'+x)}
function sw(i){
  document.querySelectorAll('.tab').forEach((t,x)=>t.classList.toggle('a',x===i));
  document.querySelectorAll('.p').forEach((p,x)=>p.classList.toggle('a',x===i));
  if(i===2) setTimeout(()=>inp.focus(),150); rst();
}

function tm(id){
  if(id==='ctrl')ctrl=1-ctrl; if(id==='alt')alt=1-alt; if(id==='shift')shift=1-shift; if(id==='win')win=1-win;
  document.getElementById(id).classList.toggle('on');
  inp.focus(); rst();
}
function clr(){
  ctrl=shift=alt=win=0;
  document.querySelectorAll('.mod').forEach(x=>x.classList.remove('on'));
  if(ws?.readyState===1) ws.send(`syn|0|0|0|0|0|0|0|0`);
  if(timer) clearTimeout(timer); timer=null;
}
function sk(vk){s(`key|${vk}`)}

const pad=document.getElementById('pad');
let lx=0,ly=0,ax=0,ay=0,as=0,mf=0,ts=0,mv_dist=0,ct=null,dr=0,lpt=null;

setInterval(()=>{
  if(ax||ay){s(`mv|${ax.toFixed(1)}|${ay.toFixed(1)}`);ax=ay=0}
  if(as){s(`sc|${as.toFixed(1)}`);as=0}
},16);

function clrLpt(){ if(lpt){clearTimeout(lpt);lpt=null;} }

pad.ontouchstart=e=>{
  e.preventDefault(); const f=e.touches.length; mf=Math.max(mf,f);
  lx=e.touches[0].clientX; ly=e.touches[0].clientY;
  if(f===1&&mf===1){
    if(ct){clearTimeout(ct);ct=null;dr=1;s('md|1')} // Second tap while pending = drag
    ts=Date.now();mv_dist=0;
    if(!dr) lpt=setTimeout(()=>{ if(mv_dist<8&&!dr){ s('rc'); dr=2; } lpt=null; },500);
  } else { mv_dist=0; clrLpt(); }
};
pad.ontouchmove=e=>{
  e.preventDefault();
  const cx=e.touches[0].clientX,cy=e.touches[0].clientY,dx=cx-lx,dy=cy-ly;
  mv_dist+=Math.abs(dx)+Math.abs(dy);
  if(mv_dist>8) clrLpt();
  if(mf===1){ax+=dx;ay+=dy}else if(mf>=2&&mv_dist>3){as+=dy}
  lx=cx;ly=cy;
};
pad.ontouchend=e=>{
  e.preventDefault(); const d=Date.now()-ts;
  clrLpt();
  if(dr===1){s('mu|1');dr=0;mf=0;return}
  if(dr===2){dr=0;mf=0;return}
  if(!e.touches.length){
    if(mf===1&&mv_dist<12&&d<250){ct=setTimeout(()=>{s('cl');ct=null},150)}
    else if(mf>=2&&mv_dist<15&&d<350){s('rc')}
    mf=0;
  }
};

let ign=0;
inp.onkeydown=e=>{
  const k=e.keyCode||e.which;
  if(k===229) return;
  if(ctrl||alt||win||(shift&&e.key?.length>1)){sk(k);e.preventDefault();ign=1;setTimeout(()=>ign=0,50);return}
  if(e.key?.length===1){s('type|'+e.key);e.preventDefault();ign=1;setTimeout(()=>ign=0,50)}
  else{sk(k);e.preventDefault();ign=1;setTimeout(()=>ign=0,50)}
};
inp.oninput=e=>{
  if(!e.data){inp.value='';return}
  if(ctrl||alt||win){ 
    let c = e.data.substring(e.data.length-1);
    sk(c.toUpperCase().charCodeAt(0));
  } else if(!ign){ s('type|'+e.data); }
  inp.value=''; ign=0;
};

const mediaList=document.getElementById('media-list'), mediaTitle=document.getElementById('media-title');
const svgs = {
  prev: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>',
  play: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>',
  pause: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>',
  next: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>'
};

async function fetchMedia(){
  if(ws?.readyState!==1)return;
  try {
    const res=await fetch('/media'+location.search);
    const data=await res.json();
    
    // Update Battery + Volume
    if(data.sys){
      document.getElementById('bat-val').innerText = data.sys.bat + '%';
      const fill = document.getElementById('bat-fill');
      fill.style.width = data.sys.bat + '%';
      fill.classList.toggle('low', data.sys.bat < 20);
      document.getElementById('bat-charging').style.display = data.sys.charging ? 'inline' : 'none';
      const volEl = document.getElementById('vol-val');
      if(volEl && data.sys.vol !== null && data.sys.vol !== undefined){
        volEl.innerText = '🔊 ' + data.sys.vol + '%';
      }
    }

    if(data.streams && data.streams.length>0){
      mediaTitle.style.display='block';
      mediaList.innerHTML=data.streams.map(p=>`
        <div class="media-card">
          <div class="mc-header">
            <div style="flex:1;min-width:0"><div class="mc-title">${p.title}</div><div class="mc-artist">${p.artist} · ${p.id.split('.')[0]}</div></div>
            <div class="mc-status ${p.status.toLowerCase()}">${p.status}</div>
          </div>
          <div class="mc-controls">
            <button class="mc-btn" onclick="mc('prev','${p.id}',this)">${svgs.prev}</button>
            <button class="mc-btn" style="background:#1e293b" onclick="mc('play','${p.id}',this)">${p.status==='Playing'?svgs.pause:svgs.play}</button>
            <button class="mc-btn" onclick="mc('next','${p.id}',this)">${svgs.next}</button>
          </div>
        </div>
      `).join('');
    } else { 
      mediaTitle.style.display='block';
      mediaList.innerHTML='<div class="info" style="text-align:center; padding:20px; color:#475569;">Searching for active media players...</div>';
    }
  }catch(e){}
}
function mc(action,id,btn){
  c(`${action}|${id}`);
  if(action==='play'){
    const statusEl=btn.closest('.media-card').querySelector('.mc-status');
    const isPlaying=statusEl.classList.contains('playing');
    statusEl.classList.toggle('playing',!isPlaying);
    statusEl.innerText=isPlaying?'Paused':'Playing';
    btn.innerHTML=isPlaying?svgs.play:svgs.pause;
  }
  setTimeout(fetchMedia,300);
}
setInterval(fetchMedia,2000);
fetchMedia();
</script></body></html>
